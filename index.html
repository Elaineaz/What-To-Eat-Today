<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>今天吃什么 · 占卜</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fdf8f2;--ink:#1a1a1a;--muted:#999;
  --gold:#f5c842;--purple:#c8a0e8;--radius:20px;
}
html,body{min-height:100%;background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(circle at 10% 15%,#ffd6cc44 0%,transparent 35%),
             radial-gradient(circle at 90% 80%,#d6f5e844 0%,transparent 35%),
             radial-gradient(circle at 50% 50%,#ede0ff22 0%,transparent 50%)}
.wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:32px 20px 60px}

/* 标题 */
.site-title{text-align:center;margin-bottom:28px}
.site-title h1{font-size:clamp(22px,6vw,32px);font-weight:900;letter-spacing:4px;line-height:1.3}
.site-title p{font-size:13px;color:var(--muted);margin-top:8px;letter-spacing:1px}

/* 模式切换 */
.mode-tabs{display:flex;gap:10px;justify-content:center;margin-bottom:28px}
.mode-tab{padding:10px 24px;border-radius:999px;border:2.5px solid var(--ink);background:transparent;
  font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;
  box-shadow:3px 3px 0 var(--ink)}
.mode-tab.active{background:var(--ink);color:#fff;box-shadow:none;transform:translate(2px,2px)}
.mode-tab:not(.active):hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}

/* 起卦区 */
.cast-section{display:flex;flex-direction:column;align-items:center;gap:20px;margin-bottom:32px}
.cast-hint{font-size:13px;color:var(--muted);text-align:center;line-height:2}

/* 铜钱按钮 */
.coin-btn{width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fff8e0,#f5c842 60%,#d4a010);
  border:4px solid #c8900a;
  box-shadow:0 6px 24px rgba(200,144,10,.35),inset 0 2px 8px rgba(255,255,255,.6);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.coin-btn::after{content:'';position:absolute;width:100px;height:100px;border-radius:50%;border:3px solid rgba(200,144,10,.4)}
.coin-btn:hover{transform:scale(1.05);box-shadow:0 10px 32px rgba(200,144,10,.45)}
.coin-btn:active{transform:scale(.96)}
.coin-btn.shaking{animation:coinShake .6s ease}
@keyframes coinShake{0%,100%{transform:rotate(0) scale(1.02)}15%{transform:rotate(-12deg) scale(1.06)}30%{transform:rotate(12deg) scale(1.06)}45%{transform:rotate(-8deg) scale(1.04)}60%{transform:rotate(8deg) scale(1.04)}75%{transform:rotate(-4deg) scale(1.02)}}
.coin-icon{font-size:44px;line-height:1}
.coin-label{font-size:13px;font-weight:900;color:#7a5000;letter-spacing:2px}

/* 塔罗牌堆 */
.tarot-deck{position:relative;width:120px;height:180px;cursor:pointer;transition:transform .15s;margin-top:10px}
.tarot-deck:hover{transform:translateY(-6px)}
.tarot-deck:active{transform:translateY(0)}
.tarot-card-back{position:absolute;width:110px;height:170px;border-radius:14px;border:3px solid var(--ink);
  display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:4px 4px 0 var(--ink);transition:all .15s}
.tarot-card-back:nth-child(1){background:linear-gradient(135deg,#c8a0e8,#9060c0);top:10px;left:10px;transform:rotate(-6deg)}
.tarot-card-back:nth-child(2){background:linear-gradient(135deg,#d4b8f8,#a878d8);top:5px;left:5px;transform:rotate(-2deg)}
.tarot-card-back:nth-child(3){background:linear-gradient(135deg,#e8d0ff,#c090e8);top:0;left:0;transform:rotate(2deg)}
.tarot-deck.drawing .tarot-card-back:nth-child(3){animation:cardDraw .8s ease forwards}
@keyframes cardDraw{0%{transform:rotate(2deg)}30%{transform:rotate(-15deg) translateY(-30px) translateX(20px)}60%{transform:rotate(10deg) translateY(-60px) translateX(-10px)}100%{transform:rotate(0deg) translateY(-80px) scale(1.1);opacity:0}}
.tarot-label{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:900;color:var(--ink);white-space:nowrap}

/* loading */
.loading{display:none;flex-direction:column;align-items:center;gap:12px;margin:20px 0}
.loading.show{display:flex}
.dots{display:flex;gap:6px}
.dots span{width:10px;height:10px;border-radius:50%;background:var(--gold);animation:dotBounce .8s ease infinite}
.dots span:nth-child(2){animation-delay:.15s;background:var(--purple)}
.dots span:nth-child(3){animation-delay:.3s;background:#ff9999}
@keyframes dotBounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1.2);opacity:1}}
.loading p{font-size:13px;color:#aaa}

/* 结果区 */
.result-section{display:none;flex-direction:column;align-items:center;gap:0}
.result-section.show{display:flex;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* 六爻卦象 */
.hex-display{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
.hex-name{font-size:20px;font-weight:900;margin-bottom:4px}
.hex-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.yao-lines{display:flex;flex-direction:column-reverse;gap:9px;align-items:center}
.yao-row{display:flex;align-items:center;gap:10px;opacity:0;transform:translateX(-14px)}
.yao-row.appear{animation:yaoIn .3s ease forwards}
@keyframes yaoIn{to{opacity:1;transform:translateX(0)}}
.yao-num{font-size:10px;color:#ccc;width:14px;text-align:right}
.yao-yang{width:88px;height:11px;background:var(--gold);border-radius:6px;box-shadow:0 2px 8px rgba(245,200,66,.5)}
.yao-yin-l,.yao-yin-r{width:38px;height:11px;background:var(--purple);border-radius:6px;box-shadow:0 2px 8px rgba(200,160,232,.5)}
.yao-gap{width:12px}
.yao-change{font-size:13px;color:#ff6b6b;margin-left:2px}

/* 塔罗牌展示 */
.tarot-reveal{width:160px;height:240px;border-radius:18px;border:3px solid var(--ink);
  box-shadow:6px 6px 0 var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  margin-bottom:24px;animation:cardFlip .6s ease;position:relative;overflow:hidden}
@keyframes cardFlip{0%{transform:rotateY(90deg) scale(.8);opacity:0}100%{transform:rotateY(0deg) scale(1);opacity:1}}
.tarot-reveal-num{font-size:10px;color:rgba(255,255,255,.7);letter-spacing:2px}
.tarot-reveal-svg{width:90px;height:90px}
.tarot-reveal-name{font-size:16px;font-weight:900;color:#fff;text-align:center;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.tarot-reveal-keyword{font-size:11px;color:rgba(255,255,255,.8);letter-spacing:1px}

/* 食物卡片 */
.food-card{width:100%;border-radius:24px;border:3px solid var(--ink);box-shadow:7px 7px 0 var(--ink);overflow:hidden;animation:fadeUp .5s ease .7s both}
.food-header{padding:28px 24px 20px;display:flex;flex-direction:column;align-items:center;gap:10px}
.food-img-wrap{width:120px;height:120px;border-radius:50%;border:3px solid rgba(255,255,255,.6);
  box-shadow:0 4px 20px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.3);overflow:hidden}
.food-img-wrap svg{width:100px;height:100px}
.food-name{font-size:28px;font-weight:900;color:#fff;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,.2)}
.food-cuisine{font-size:12px;color:rgba(255,255,255,.85);letter-spacing:2px}
.food-tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.food-tag{padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;
  background:rgba(255,255,255,.25);color:#fff;border:1.5px solid rgba(255,255,255,.5)}
.food-body{background:#fff;padding:20px 24px 24px;display:flex;flex-direction:column;gap:14px}
.block{background:#fafafa;border-radius:14px;padding:14px 16px;border:1.5px solid #f0f0f0}
.block-title{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.block-dot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}
.block-body{font-size:14px;line-height:1.9;color:#333}
.yi-ji{display:flex;gap:10px}
.yi,.ji{flex:1;border-radius:12px;padding:12px;text-align:center}
.yi{background:#edfaf3;border:1.5px solid #b8e8cc}
.ji{background:#fff0f0;border:1.5px solid #f8c8c8}
.yi-ji-label{font-size:10px;font-weight:900;letter-spacing:2px;margin-bottom:5px}
.yi .yi-ji-label{color:#3dba7e}
.ji .yi-ji-label{color:#e05c5c}
.yi-ji-val{font-size:13px;font-weight:700;color:#333;line-height:1.6}
.verse{border-radius:14px;padding:16px 18px;text-align:center;font-size:15px;font-weight:700;line-height:1.9;color:#fff;box-shadow:3px 3px 0 rgba(0,0,0,.1)}

/* 按钮 */
.action-row{display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap}
.btn{padding:14px 32px;border-radius:999px;border:2.5px solid var(--ink);font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .12s;display:inline-flex;align-items:center;gap:6px}
.btn-dark{background:var(--ink);color:#fff;box-shadow:4px 4px 0 #555}
.btn-dark:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 #555}
.btn-dark:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #555}
.btn-outline{background:transparent;color:var(--ink);box-shadow:4px 4px 0 var(--ink)}
.btn-outline:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 var(--ink)}
.btn-outline:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
.footer-note{text-align:center;font-size:11px;color:#ccc;margin-top:32px;line-height:2}
</style>
</head>
<body>
<div class="wrap">

  <div class="site-title">
    <h1>🔮 今天吃什么</h1>
    <p>占卜今日口腹之缘 · 天机不可泄露</p>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-tarot" onclick="switchMode('tarot')">🃏 塔罗抽牌</button>
    <button class="mode-tab" id="tab-hex" onclick="switchMode('hex')">🪙 六爻起卦</button>
  </div>

  <!-- 起卦区 -->
  <div class="cast-section" id="cast-section">
    <p class="cast-hint" id="cast-hint">心中默念今日想吃什么<br/>点击牌堆，抽取命运之牌</p>

    <!-- 塔罗牌堆 -->
    <div class="tarot-deck" id="tarot-deck" onclick="doCast()">
      <div class="tarot-card-back">✦</div>
      <div class="tarot-card-back">✦</div>
      <div class="tarot-card-back">✦</div>
      <div class="tarot-label">点击抽牌</div>
    </div>

    <!-- 铜钱按钮（隐藏） -->
    <button class="coin-btn" id="coin-btn" style="display:none" onclick="doCast()">
      <span class="coin-icon">🪙</span>
      <span class="coin-label">起 卦</span>
    </button>
  </div>

  <!-- loading -->
  <div class="loading" id="loading">
    <div class="dots"><span></span><span></span><span></span></div>
    <p id="loading-text">天机推演中…</p>
  </div>

  <!-- 结果区 -->
  <div class="result-section" id="result-section">

    <!-- 六爻卦象（按需显示） -->
    <div class="hex-display" id="hex-display" style="display:none">
      <div class="hex-name" id="hex-name"></div>
      <div class="hex-sub" id="hex-sub"></div>
      <div class="yao-lines" id="yao-lines"></div>
    </div>

    <!-- 塔罗牌展示（按需显示） -->
    <div id="tarot-display" style="display:none">
      <div class="tarot-reveal" id="tarot-reveal"></div>
    </div>

    <!-- 食物卡片 -->
    <div class="food-card" id="food-card">
      <div class="food-header" id="food-header">
        <div class="food-img-wrap" id="food-img-wrap"></div>
        <div class="food-name" id="food-name"></div>
        <div class="food-cuisine" id="food-cuisine"></div>
        <div class="food-tags" id="food-tags"></div>
      </div>
      <div class="food-body">
        <div class="block">
          <div class="block-title"><span class="block-dot" id="block-dot"></span><span id="block-title-text">卦象解读</span></div>
          <div class="block-body" id="block-body"></div>
        </div>
        <div class="yi-ji">
          <div class="yi"><div class="yi-ji-label">今日宜</div><div class="yi-ji-val" id="yi-val"></div></div>
          <div class="ji"><div class="yi-ji-label">今日忌</div><div class="yi-ji-val" id="ji-val"></div></div>
        </div>
        <div class="verse" id="verse"></div>
      </div>
    </div>

    <div class="action-row">
      <button class="btn btn-outline" onclick="resetAll()">🔄 再算一次</button>
    </div>
    <div class="footer-note">卦象仅供娱乐 · 吃好才是真道理<br/>愿你今日口腹大满足 🍜</div>
  </div>

</div>

let mode = 'tarot';
let casting = false;

function switchMode(m) {
  mode = m;
  document.getElementById('tab-tarot').classList.toggle('active', m === 'tarot');
  document.getElementById('tab-hex').classList.toggle('active', m === 'hex');
  document.getElementById('cast-hint').innerHTML = m === 'tarot'
    ? '心中默念今日想吃什么<br/>点击牌堆，抽取命运之牌'
    : '心中默念今日想吃什么<br/>点击铜钱，天机自现';
  document.getElementById('tarot-deck').style.display = m === 'tarot' ? 'block' : 'none';
  document.getElementById('coin-btn').style.display = m === 'hex' ? 'flex' : 'none';
  document.getElementById('cast-section').style.display = 'flex';
  document.getElementById('result-section').classList.remove('show');
  document.getElementById('loading').classList.remove('show');
  casting = false;
}

function randInt(max) {
  return Math.floor(Math.random() * max);
}

function doCast() {
  if (casting) return;
  casting = true;

  if (mode === 'tarot') {
    const deck = document.getElementById('tarot-deck');
    deck.classList.add('drawing');
    document.getElementById('loading-text').textContent = '塔罗牌正在感应你的缘分…';
  } else {
    const btn = document.getElementById('coin-btn');
    btn.classList.add('shaking');
    setTimeout(() => btn.classList.remove('shaking'), 600);
    document.getElementById('loading-text').textContent = '六爻推演中，天机即将揭晓…';
  }

  document.getElementById('cast-section').style.display = 'none';
  document.getElementById('loading').classList.add('show');

  setTimeout(() => {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('tarot-deck').classList.remove('drawing');
    showResult();
  }, 1400);
}

function showResult() {
  let title, subtitle, headerBg, headerColor, food, extraHtml = '';

  if (mode === 'tarot') {
    const cardIdx = randInt(TAROT.length);
    const card = TAROT[cardIdx];
    food = ALL_FOODS[randInt(ALL_FOODS.length)];
    title = card.num + ' · ' + card.name;
    subtitle = card.keyword;
    headerBg = card.bg;
    headerColor = card.color;

    // 塔罗牌展示
    document.getElementById('tarot-display').style.display = 'flex';
    document.getElementById('hex-display').style.display = 'none';
    document.getElementById('block-title-text').textContent = '塔罗解读';
    document.getElementById('tarot-reveal').style.background = card.bg;
    document.getElementById('tarot-reveal').innerHTML = `
      <div class="tarot-reveal-num">${card.num}</div>
      <div class="tarot-reveal-svg">${getTarotSVG(card.num)}</div>
      <div class="tarot-reveal-name">${card.name}</div>
      <div class="tarot-reveal-keyword">${card.keyword}</div>
    `;
  } else {
    const hexIdx = randInt(HEXAGRAMS.length);
    const hex = HEXAGRAMS[hexIdx];
    food = ALL_FOODS[randInt(ALL_FOODS.length)];
    title = hex.name;
    subtitle = hex.sub;
    headerBg = hex.bg;
    headerColor = hex.color;

    // 六爻展示
    document.getElementById('hex-display').style.display = 'flex';
    document.getElementById('tarot-display').style.display = 'none';
    document.getElementById('block-title-text').textContent = '卦象解读';
    document.getElementById('hex-name').textContent = hex.name;
    document.getElementById('hex-sub').textContent = hex.sub;

    // 生成六爻线
    const yaoLines = document.getElementById('yao-lines');
    yaoLines.innerHTML = '';
    for (let i = 0; i < 6; i++) {
      const v = randInt(4);
      const yang = v % 2 === 0;
      const change = v === 0 || v === 3;
      const row = document.createElement('div');
      row.className = 'yao-row';
      if (yang) {
        row.innerHTML = `<span class="yao-num">${i+1}</span><div class="yao-yang"></div>${change ? '<span class="yao-change">○</span>' : ''}`;
      } else {
        row.innerHTML = `<span class="yao-num">${i+1}</span><div class="yao-yin-l"></div><div class="yao-gap"></div><div class="yao-yin-r"></div>${change ? '<span class="yao-change">○</span>' : ''}`;
      }
      yaoLines.appendChild(row);
      setTimeout(() => row.classList.add('appear'), i * 120);
    }
  }

  // 填充食物卡片
  document.getElementById('food-header').style.background = headerBg;
  document.getElementById('food-img-wrap').innerHTML = getFoodSVG(food.name, headerColor);
  document.getElementById('food-name').textContent = food.name;
  document.getElementById('food-cuisine').textContent = food.cuisine;
  document.getElementById('food-tags').innerHTML = food.tags.map(t =>
    `<span class="food-tag">${t}</span>`
  ).join('');
  document.getElementById('block-dot').style.background = headerColor;
  document.getElementById('block-body').textContent = food.desc;
  document.getElementById('yi-val').textContent = food.yi;
  document.getElementById('ji-val').textContent = food.ji;
  document.getElementById('verse').textContent = food.verse;
  document.getElementById('verse').style.background = headerColor;

  document.getElementById('result-section').classList.add('show');
}

function getTarotSVG(num) {
  const svgs = {
    '0': `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="28" r="14" fill="rgba(255,255,255,0.3)"/><circle cx="36" cy="25" r="3" fill="#fff"/><circle cx="44" cy="25" r="3" fill="#fff"/><path d="M35 32 Q40 36 45 32" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M28 50 Q40 44 52 50 L52 68 Q40 72 28 68 Z" fill="rgba(255,255,255,0.2)"/><path d="M52 50 L68 36" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/><circle cx="70" cy="34" r="5" fill="rgba(255,255,255,0.5)"/></svg>`,
    'I': `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="28" r="12" fill="rgba(255,255,255,0.3)"/><circle cx="36" cy="25" r="2.5" fill="#fff"/><circle cx="44" cy="25" r="2.5" fill="#fff"/><path d="M35 32 Q40 36 45 32" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/><rect x="30" y="40" width="20" height="24" rx="4" fill="rgba(255,255,255,0.2)"/><path d="M40 16 L40 8" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" stroke-linecap="round"/><circle cx="40" cy="6" r="3" fill="rgba(255,255,255,0.8)"/></svg>`,
    'default': `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="40" r="28" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/><path d="M40 20 L42 28 L50 28 L44 33 L46 41 L40 36 L34 41 L36 33 L30 28 L38 28 Z" fill="rgba(255,255,255,0.7)"/></svg>`
  };
  return svgs[num] || svgs['default'];
}

function resetAll() {
  casting = false;
  document.getElementById('result-section').classList.remove('show');
  document.getElementById('tarot-deck').classList.remove('drawing');
  document.getElementById('cast-section').style.display = 'flex';
}

// 初始化
switchMode('tarot');
</script>
